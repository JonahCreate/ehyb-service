<style>
  /* Services-page specific — keeps the original pricing-page card vocabulary */
  body { background: var(--color-cream); color: var(--color-dark); }

  .sv2-hero { padding: 5.5rem 0 3.5rem; text-align: center; border-bottom: 1px solid var(--rule-soft); }
  .sv2-hero .eyebrow { justify-content: center; display: inline-block; }
  .sv2-hero-title {
    font-family: var(--font-display);
    font-weight: var(--w-bold);
    font-size: clamp(2rem, 6vw, 3rem);
    line-height: 1.3;
    letter-spacing: .02em;
    margin: 1rem auto 0;
    max-width: 22ch;
  }
  .sv2-hero-em { color: var(--color-primary); }
  .sv2-hero-divider {
    width: 40px; height: 1px;
    background: var(--color-primary);
    margin: 2rem auto;
  }
  .sv2-hero-desc {
    color: var(--color-mid);
    font-size: 1.02rem;
    line-height: 2;
    max-width: 40rem;
    margin: 0 auto 2rem;
  }
  .sv2-hero-actions {
    display: inline-flex;
    flex-wrap: wrap;
    gap: .7rem;
    justify-content: center;
  }

  .sv-services {
    padding: 4rem 1.5rem 5rem;
    max-width: 1180px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.6rem;
  }
  .sv-card { background: var(--color-white); border: 1px solid var(--color-cream-dark); padding: 3rem 2.6rem; position: relative; transition: box-shadow .3s ease; }
  .sv-card:hover { box-shadow: var(--shadow-card-hover); }
  .sv-span2 { grid-column: span 2; }
  .sv-card-free { background: var(--color-clay-deep); border-color: var(--color-clay-deep); display: grid; grid-template-columns: 1fr 1fr; gap: 0; padding: 0; }
  .sv-card-free .sv-card-content { padding: 3rem 2.6rem; }
  .sv-card-side { background: var(--color-primary); padding: 3rem 2.6rem; display: flex; flex-direction: column; justify-content: center; }
  .sv-card-tag { font-family: var(--font-accent); font-size: .7rem; letter-spacing: .3em; text-transform: uppercase; color: var(--color-primary); margin-bottom: 1.2rem; display: block; }
  .sv-card-free .sv-card-tag { color: var(--color-cream); opacity: .7; }
  .sv-card-title { font-family: var(--font-display); font-size: 1.7rem; font-weight: var(--w-bold); line-height: 1.4; letter-spacing: .02em; margin-bottom: .5rem; color: var(--color-dark); }
  .sv-card-free .sv-card-title { color: var(--color-cream); font-size: 1.9rem; }
  .sv-card-price { font-family: var(--font-accent); font-size: 2.2rem; font-weight: 500; color: var(--color-primary); margin: 1.2rem 0 .4rem; letter-spacing: -.01em; }
  .sv-card-free .sv-card-price { color: var(--color-cream); font-size: 2.8rem; }
  .sv-card-price-note { font-size: .82rem; color: var(--color-gray); margin-bottom: 1.6rem; }
  .sv-card-free .sv-card-price-note { color: rgba(245,237,227,.7); }
  .sv-card-divider { width: 30px; height: 1px; background: var(--color-cream-dark); margin: 0 0 1.6rem; }
  .sv-card-free .sv-card-divider { background: rgba(245,237,227,.25); }
  .sv-card-desc { font-size: .95rem; line-height: 1.9; color: var(--ink-body); margin-bottom: 1.6rem; }
  .sv-card-free .sv-card-desc { color: rgba(245,237,227,.85); }
  .sv-gets-title { font-family: var(--font-accent); font-size: .72rem; letter-spacing: .28em; text-transform: uppercase; color: var(--color-mid); margin-bottom: .9rem; display: block; }
  .sv-card-free .sv-gets-title { color: rgba(245,237,227,.6); }
  .sv-gets-list { list-style: none; margin: 0 0 1.8rem; padding: 0; }
  .sv-gets-list li { font-size: .95rem; color: var(--color-dark); padding: .55rem 0 .55rem 1.4rem; position: relative; line-height: 1.7; border-bottom: 1px solid rgba(26,26,26,.06); }
  .sv-gets-list li:last-child { border-bottom: none; }
  .sv-gets-list li::before { content: '✦'; position: absolute; left: 0; color: var(--color-primary); font-size: .7rem; top: .85rem; }
  .sv-card-free .sv-gets-list li { color: rgba(245,237,227,.88); border-bottom-color: rgba(245,237,227,.1); }
  .sv-card-free .sv-gets-list li::before { color: var(--color-cream); opacity: .5; }
  .sv-diff-note { background: rgba(232,84,26,.08); border-left: 3px solid var(--color-primary); padding: .8rem 1rem; font-size: .88rem; color: var(--color-primary); line-height: 1.7; margin-bottom: 1.6rem; }
  .sv-card-side-title { font-family: var(--font-display); font-size: 1.4rem; font-weight: var(--w-bold); color: var(--color-dark); line-height: 1.4; margin-bottom: 1.4rem; }
  .sv-card-side-list { list-style: none; padding: 0; margin: 0; }
  .sv-card-side-list li { font-size: .92rem; color: var(--color-dark); padding: .55rem 0 .55rem 1.4rem; position: relative; border-bottom: 1px solid rgba(26,26,26,.14); line-height: 1.7; }
  .sv-card-side-list li:last-child { border-bottom: none; }
  .sv-card-side-list li::before { content: '→'; position: absolute; left: 0; font-size: .85rem; top: .7rem; color: var(--color-dark); }
  .sv-footnote { font-size: .85rem; color: var(--color-mid); line-height: 1.8; margin: 0; font-family: var(--font-accent); font-style: italic; }

  .sv-ladder { max-width: 1180px; margin: 0 auto 5rem; padding: 0 1.5rem; }
  .sv-ladder-title { font-family: var(--font-accent); font-size: .78rem; letter-spacing: .3em; text-transform: uppercase; color: var(--color-mid); margin-bottom: 1.6rem; display: block; text-align: center; }
  .sv-ladder-steps { display: flex; align-items: stretch; background: var(--color-white); border: 1px solid var(--color-cream-dark); overflow: hidden; }
  .sv-step { flex: 1; padding: 1.8rem 1.6rem; border-right: 1px solid var(--color-cream-dark); position: relative; }
  .sv-step:last-child { border-right: none; }
  .sv-step-dark { background: var(--color-clay-deep); }
  .sv-step-dark .sv-step-num { color: var(--color-primary); }
  .sv-step-dark .sv-step-name { color: var(--color-cream); }
  .sv-step-dark .sv-step-price { color: var(--color-primary); }
  .sv-step-num { font-family: var(--font-accent); font-size: .72rem; letter-spacing: .3em; color: var(--color-primary); text-transform: uppercase; display: block; margin-bottom: .5rem; }
  .sv-step-name { font-family: var(--font-display); font-size: 1rem; font-weight: var(--w-bold); color: var(--color-dark); display: block; margin-bottom: .5rem; line-height: 1.4; }
  .sv-step-price { font-family: var(--font-accent); font-size: 1.3rem; font-weight: 500; color: var(--color-primary); }
  .sv-step-arrow { width: 0; height: 0; border-top: 20px solid transparent; border-bottom: 20px solid transparent; border-left: 12px solid var(--color-cream-dark); flex-shrink: 0; align-self: center; }

  .sv-cta-foot { padding: 4rem 0 5rem; background: var(--color-primary); color: var(--color-cream); text-align: center; }
  .sv-cta-foot h2 { font-family: var(--font-display); font-size: clamp(1.6rem, 4vw, 2.3rem); font-weight: var(--w-bold); margin: 0 0 1rem; color: var(--color-cream); }
  .sv-cta-foot p { color: rgba(245,237,227,.88); margin: 0 auto 2rem; max-width: 32ch; line-height: 1.8; }
  .sv-cta-foot .sv-cta-actions { display: inline-flex; flex-wrap: wrap; gap: .8rem; justify-content: center; }

  @media (max-width: 48rem) {
    .sv-services { padding: 2.5rem 1rem 3rem; grid-template-columns: 1fr; gap: 1.2rem; }
    .sv-card { padding: 2rem 1.4rem; }
    .sv-span2 { grid-column: span 1; }
    .sv-card-free { grid-template-columns: 1fr; }
    .sv-card-free .sv-card-content { padding: 2rem 1.4rem; }
    .sv-card-side { padding: 2rem 1.4rem; }
    .sv-ladder { padding: 0 1rem; }
    .sv-ladder-steps { flex-direction: column; }
    .sv-step { border-right: none; border-bottom: 1px solid var(--color-cream-dark); padding: 1.2rem 1.4rem; }
    .sv-step-arrow { display: none; }
  }
</style>
</head>
