<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>這就是品牌 · Exactly How You Brand</title>
<meta name="description" content="幫有料的人，把自己說清楚。免費 15 分鐘品牌診斷。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="styles.css">
</head>
<body id="top">
<div id="root"></div>

<script>
  // Tweakable defaults. Host rewrites this block when __edit_mode_set_keys arrives.
  window.__TWEAK_DEFAULTS__ = /*EDITMODE-BEGIN*/{
    "heroVariant": "classic",
    "heroGlyph": "品牌",
    "accent": "normal",
    "processDensity": "normal"
  }/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/SiteNav.jsx"></script>
<script type="text/babel" src="components/Hero.jsx"></script>
<script type="text/babel" src="components/Process.jsx"></script>
<script type="text/babel" src="components/Booking.jsx"></script>
<script type="text/babel" src="components/Footer.jsx"></script>
<script type="text/babel" src="components/Tweaks.jsx"></script>

<script type="text/babel" data-presets="env,react">
  function App() {
    const [state, setState] = React.useState(window.__TWEAK_DEFAULTS__);

    return (
      <React.Fragment>
        <SiteNav active="home" onDark={true}/>
        <main>
          <Hero
            variant={state.heroVariant}
            glyphWord={state.heroGlyph}
            accent={state.accent}
          />
          <Process density={state.processDensity}/>
          <Booking/>
        </main>
        <Footer/>
        <Tweaks state={state} setState={setState}/>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
